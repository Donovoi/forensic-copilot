<svg width="1200" height="620" viewBox="0 0 1200 620" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="1200" y2="620" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FBFF"/>
      <stop offset="1" stop-color="#ECF4FF"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#3B82F6"/>
      <stop offset="1" stop-color="#1D4ED8"/>
    </linearGradient>
    <linearGradient id="teal" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#2DD4BF"/>
      <stop offset="1" stop-color="#0F766E"/>
    </linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FBBF24"/>
      <stop offset="1" stop-color="#EA580C"/>
    </linearGradient>
    <filter id="soft" x="-20" y="-20" width="1240" height="660" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#93B3E5" flood-opacity="0.26"/>
    </filter>
  </defs>

  <rect width="1200" height="620" rx="28" fill="url(#panel)"/>
  <text x="62" y="62" fill="#0F223D" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="34" font-weight="850">Forensic Copilot loop</text>
  <text x="62" y="95" fill="#52677F" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18">One visible examiner coordinates platform-aware, offline-ready helper agents before evidence is collected or reported.</text>

  <g transform="translate(62 130)" filter="url(#soft)">
    <rect x="0" y="0" width="220" height="104" rx="18" fill="#FFFFFF" stroke="#D4E4FF"/>
    <rect x="286" y="0" width="220" height="104" rx="18" fill="#FFFFFF" stroke="#D4E4FF"/>
    <rect x="572" y="0" width="220" height="104" rx="18" fill="#FFFFFF" stroke="#D4E4FF"/>
    <rect x="858" y="0" width="220" height="104" rx="18" fill="#FFFFFF" stroke="#D4E4FF"/>
  </g>

  <g transform="translate(62 130)">
    <circle cx="34" cy="34" r="17" fill="url(#blue)"/>
    <text x="34" y="40" text-anchor="middle" fill="#FFFFFF" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="850">1</text>
    <text x="66" y="32" fill="#10223D" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="20" font-weight="850">Case brief</text>
    <text x="20" y="66" fill="#5D7390" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14">Scope, authority, question,</text>
    <text x="20" y="86" fill="#5D7390" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14">time window, report path.</text>

    <circle cx="320" cy="34" r="17" fill="url(#blue)"/>
    <text x="320" y="40" text-anchor="middle" fill="#FFFFFF" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="850">2</text>
    <text x="352" y="32" fill="#10223D" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="20" font-weight="850">Platform profile</text>
    <text x="306" y="66" fill="#5D7390" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14">Evidence OS, mode, host role,</text>
    <text x="306" y="86" fill="#5D7390" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14">runner boundary, filesystem.</text>

    <circle cx="606" cy="34" r="17" fill="url(#teal)"/>
    <text x="606" y="40" text-anchor="middle" fill="#FFFFFF" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="850">3</text>
    <text x="638" y="32" fill="#10223D" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="20" font-weight="850">Tool plan</text>
    <text x="592" y="66" fill="#5D7390" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14">Research, select, provision,</text>
    <text x="592" y="86" fill="#5D7390" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14">or document native paths.</text>

    <circle cx="892" cy="34" r="17" fill="url(#amber)"/>
    <text x="892" y="40" text-anchor="middle" fill="#FFFFFF" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="850">4</text>
    <text x="924" y="32" fill="#10223D" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="20" font-weight="850">Offline fallback</text>
    <text x="878" y="66" fill="#5D7390" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14">Generate script only if tools</text>
    <text x="878" y="86" fill="#5D7390" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14">are blocked, then review.</text>
  </g>

  <g stroke="#8FB4EA" stroke-width="4" stroke-linecap="round">
    <path d="M282 182H348"/>
    <path d="M568 182H634"/>
    <path d="M854 182H920"/>
  </g>
  <g fill="#8FB4EA">
    <path d="M338 174L350 182L338 190V174Z"/>
    <path d="M624 174L636 182L624 190V174Z"/>
    <path d="M910 174L922 182L910 190V174Z"/>
  </g>

  <g transform="translate(62 286)" filter="url(#soft)">
    <rect x="0" y="0" width="220" height="104" rx="18" fill="#FFFFFF" stroke="#D4E4FF"/>
    <rect x="286" y="0" width="220" height="104" rx="18" fill="#FFFFFF" stroke="#D4E4FF"/>
    <rect x="572" y="0" width="220" height="104" rx="18" fill="#FFFFFF" stroke="#D4E4FF"/>
    <rect x="858" y="0" width="220" height="104" rx="18" fill="#FFFFFF" stroke="#D4E4FF"/>
  </g>

  <g transform="translate(62 286)">
    <circle cx="34" cy="34" r="17" fill="#475569"/>
    <text x="34" y="40" text-anchor="middle" fill="#FFFFFF" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="850">5</text>
    <text x="66" y="32" fill="#10223D" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="20" font-weight="850">Collect</text>
    <text x="20" y="66" fill="#5D7390" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14">Evidence files, status records,</text>
    <text x="20" y="86" fill="#5D7390" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14">hashes, row counts.</text>

    <circle cx="320" cy="34" r="17" fill="#475569"/>
    <text x="320" y="40" text-anchor="middle" fill="#FFFFFF" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="850">6</text>
    <text x="352" y="32" fill="#10223D" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="20" font-weight="850">Route artifacts</text>
    <text x="306" y="66" fill="#5D7390" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14">OS-specific parsers, sensitive</text>
    <text x="306" y="86" fill="#5D7390" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14">stores, blocked lanes.</text>

    <circle cx="606" cy="34" r="17" fill="#475569"/>
    <text x="606" y="40" text-anchor="middle" fill="#FFFFFF" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="850">7</text>
    <text x="638" y="32" fill="#10223D" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="20" font-weight="850">Timeline</text>
    <text x="592" y="66" fill="#5D7390" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14">Correlate user, system, and</text>
    <text x="592" y="86" fill="#5D7390" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14">service activity with limits.</text>

    <circle cx="892" cy="34" r="17" fill="#7C3AED"/>
    <text x="892" y="40" text-anchor="middle" fill="#FFFFFF" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="850">8</text>
    <text x="924" y="32" fill="#10223D" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="20" font-weight="850">Challenge</text>
    <text x="878" y="66" fill="#5D7390" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14">Test attribution, causality,</text>
    <text x="878" y="86" fill="#5D7390" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14">alternatives, and gaps.</text>
  </g>

  <g stroke="#8FB4EA" stroke-width="4" stroke-linecap="round">
    <path d="M1140 234C1140 258 1114 260 1114 260H100C100 260 76 262 76 286"/>
    <path d="M282 338H348"/>
    <path d="M568 338H634"/>
    <path d="M854 338H920"/>
  </g>
  <g fill="#8FB4EA">
    <path d="M68 276L76 288L84 276H68Z"/>
    <path d="M338 330L350 338L338 346V330Z"/>
    <path d="M624 330L636 338L624 346V330Z"/>
    <path d="M910 330L922 338L910 346V330Z"/>
  </g>

  <g transform="translate(204 456)" filter="url(#soft)">
    <rect x="0" y="0" width="220" height="94" rx="18" fill="#FFFFFF" stroke="#D4E4FF"/>
    <rect x="286" y="0" width="220" height="94" rx="18" fill="#FFFFFF" stroke="#D4E4FF"/>
    <rect x="572" y="0" width="220" height="94" rx="18" fill="#FFFFFF" stroke="#D4E4FF"/>
  </g>

  <g transform="translate(204 456)">
    <circle cx="34" cy="32" r="17" fill="#7C3AED"/>
    <text x="34" y="38" text-anchor="middle" fill="#FFFFFF" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="850">9</text>
    <text x="66" y="31" fill="#10223D" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="20" font-weight="850">Report</text>
    <text x="20" y="64" fill="#5D7390" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14">Summary and findings first,</text>
    <text x="20" y="84" fill="#5D7390" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14">method and limits below.</text>

    <circle cx="320" cy="32" r="17" fill="url(#teal)"/>
    <text x="320" y="38" text-anchor="middle" fill="#FFFFFF" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="850">10</text>
    <text x="352" y="31" fill="#10223D" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="20" font-weight="850">Peer review</text>
    <text x="306" y="64" fill="#5D7390" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14">Ready, caveats, or not ready</text>
    <text x="306" y="84" fill="#5D7390" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14">before release.</text>

    <circle cx="606" cy="32" r="17" fill="url(#teal)"/>
    <text x="606" y="38" text-anchor="middle" fill="#FFFFFF" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="850">11</text>
    <text x="638" y="31" fill="#10223D" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="20" font-weight="850">Redact and improve</text>
    <text x="592" y="64" fill="#5D7390" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14">Publication hygiene, then</text>
    <text x="592" y="84" fill="#5D7390" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14">bounded maintenance changes.</text>
  </g>

  <g stroke="#8FB4EA" stroke-width="4" stroke-linecap="round">
    <path d="M1140 390C1140 430 1012 430 1012 430H238C238 430 214 432 214 456"/>
    <path d="M424 503H490"/>
    <path d="M710 503H776"/>
  </g>
  <g fill="#8FB4EA">
    <path d="M206 446L214 458L222 446H206Z"/>
    <path d="M480 495L492 503L480 511V495Z"/>
    <path d="M766 495L778 503L766 511V495Z"/>
  </g>

  <path d="M1010 560C1010 590 816 596 642 596H360C238 596 176 578 176 530" fill="none" stroke="#10B981" stroke-width="4" stroke-linecap="round" stroke-dasharray="8 10"/>
  <path d="M168 540L176 528L184 540H168Z" fill="#10B981"/>
  <text x="590" y="590" text-anchor="middle" fill="#087F5B" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="800">If review finds gaps, loop back to clarify or platform profiling.</text>
</svg>
