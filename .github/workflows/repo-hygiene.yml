name: Repo hygiene

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run repo hygiene validator
        run: python scripts/validate_repo_hygiene.py

      - name: Compile helper scripts
        run: python -m py_compile scripts/render_formal_report.py scripts/validate_repo_hygiene.py
